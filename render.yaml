services:
  - type: web
    name: rubinot-scraper
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    repo: https://github.com/caiomesq/rubinot-scraper
    branch: main
    envVars:
      - key: PYTHON_VERSION
        value: 3.12